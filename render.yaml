# Render Blueprint — 连接 GitHub 后自动读取此配置
# 文档: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-course
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    # 根目录为仓库根；前后端一体，勿改 Root Directory
    envVars:
      - key: USE_DIST
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HOST
        value: 0.0.0.0
      - key: SEED_ON_STARTUP
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      # 部署后把下面换成你的 Render 地址，或在面板手动填写
      - key: ALLOWED_ORIGINS
        value: https://ai-course.onrender.com
      # 可选：Coze AI
      - key: COZE_API_KEY
        sync: false
      - key: COZE_BOT_ID
        sync: false