<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Course — 智能体课程平台</title>
    <meta name="description" content="专业的 AI 智能体课程学习与咨询平台">
    <meta name="theme-color" content="#fbfbfd">
    <meta name="color-scheme" content="light">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="app">
        <p style="text-align:center;padding:48px;color:#86868b;">页面加载中…</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.0/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/locale/zh-cn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>

    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/utils/lazyLoad.js"></script>

    <script src="/js/components/NavBar.js"></script>
    <script src="/js/components/Footer.js"></script>
    <script src="/js/components/CourseCard.js"></script>
    <script src="/js/components/TeacherCard.js"></script>
    <script src="/js/components/BannerCarousel.js"></script>
    <script src="/js/components/AiChat.js"></script>

    <script src="/js/pages/Home.js"></script>
    <script src="/js/pages/CourseList.js"></script>
    <script src="/js/pages/CourseDetail.js"></script>
    <script src="/js/pages/Consult.js"></script>
    <script src="/js/pages/About.js"></script>

    <script src="/js/app.js"></script>
    <script>
        window.addEventListener('error', function (e) {
            var el = document.getElementById('app');
            if (el && !window.__vue_app__) {
                el.innerHTML = '<p style="text-align:center;padding:48px;color:#c00;">页面加载失败：' +
                    (e.message || '未知错误') + '<br><small>请刷新或检查网络后重试</small></p>';
            }
        });
    </script>
</body>
</html>
